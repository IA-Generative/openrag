# Docker Compose overlay for OpenRAG + Keycloak + Scaleway integration
#
# Usage:
#   docker compose -f docker-compose.yaml \
#                  -f integrations/docker-compose.integration.yaml \
#                  --profile cpu up -d
#
# This overlay:
# 1. Removes vllm/reranker dependencies (uses Scaleway API instead)
# 2. Configures OpenRAG in OIDC mode (native auth code + PKCE flow)
# 3. Connects to the owuicore-main Docker network (Keycloak, Open WebUI)
#
# Compatible with OpenRAG >= v1.1.8 (dev branch OIDC, Pydantic config,
# JSON user API, workspaces).

services:
  # Override openrag-cpu to remove vllm/reranker dependencies
  openrag-cpu:
    depends_on:
      rdb:
        condition: service_started
      milvus:
        condition: service_healthy
    dns:
      - 8.8.8.8
      - 8.8.4.4
    environment:
      # Fix SHARED_ENV to container path (host path is used for volume mount)
      - SHARED_ENV=/ray_mount/.env
      # --- OIDC Authentication (native auth code + PKCE) ---
      - AUTH_MODE=oidc
      - OIDC_ENDPOINT=${OIDC_ENDPOINT:-http://keycloak:8080/realms/openrag}
      - OIDC_CLIENT_ID=${OIDC_CLIENT_ID:-openrag}
      - OIDC_CLIENT_SECRET=${OIDC_CLIENT_SECRET}
      - OIDC_REDIRECT_URI=${OIDC_REDIRECT_URI:-http://localhost:${APP_PORT:-8180}/auth/callback}
      - OIDC_SCOPES=${OIDC_SCOPES:-openid email profile offline_access}
      - OIDC_TOKEN_ENCRYPTION_KEY=${OIDC_TOKEN_ENCRYPTION_KEY}
      - OIDC_POST_LOGOUT_REDIRECT_URI=${OIDC_POST_LOGOUT_REDIRECT_URI:-}
      - OIDC_CLAIM_SOURCE=${OIDC_CLAIM_SOURCE:-id_token}
      - OIDC_CLAIM_MAPPING=${OIDC_CLAIM_MAPPING:-display_name:name,email:email}
      # --- Scaleway LLM/Embedder (no local vllm needed) ---
      - EMBEDDER_BASE_URL=${EMBEDDER_BASE_URL}
      - EMBEDDER_API_KEY=${EMBEDDER_API_KEY}
      - EMBEDDER_MODEL_NAME=${EMBEDDER_MODEL_NAME:-bge-multilingual-gemma2}
      - RERANKER_ENABLED=${RERANKER_ENABLED:-false}
      - RERANKER_PROVIDER=${RERANKER_PROVIDER:-openai}
    profiles:
      - "cpu"
    networks:
      default:
        aliases:
          - openrag
      owuicore:

  # Indexer UI — points to OpenRAG API directly (OIDC is handled server-side)
  indexer-ui:
    environment:
      - API_BASE_URL=${API_BASE_URL:-http://localhost:${APP_PORT:-8180}}
      - INCLUDE_CREDENTIALS=false

networks:
  owuicore:
    external: true
    name: ${OWUI_NETWORK:-owui-net}
