services:
  myrag:
    build: .
    ports:
      - "${MYRAG_PORT:-8200}:8200"
    environment:
      - APP_TITLE=MyRAG (beta)
      - OPENRAG_URL=${OPENRAG_URL:-http://openrag:8080}
      - OPENRAG_ADMIN_TOKEN=${OPENRAG_ADMIN_TOKEN:-or-admin-openrag-2026}
      - KEYCLOAK_URL=${KEYCLOAK_URL:-http://keycloak:8080}
      - KEYCLOAK_REALM=${KEYCLOAK_REALM:-openwebui}
      - KEYCLOAK_CLIENT_ID=${KEYCLOAK_CLIENT_ID:-myrag-admin}
      - KEYCLOAK_CLIENT_SECRET=${KEYCLOAK_CLIENT_SECRET:-}
      - LEGIFRANCE_CLIENT_ID=${LEGIFRANCE_CLIENT_ID:-}
      - LEGIFRANCE_CLIENT_SECRET=${LEGIFRANCE_CLIENT_SECRET:-}
      - MYRAG_GROUP_ROOT=${MYRAG_GROUP_ROOT:-/myrag}
      - GRAPHRAG_VIEWER_URL=${GRAPHRAG_VIEWER_URL:-}
      - MYRAG_PUBLIC_URL=${MYRAG_PUBLIC_URL:-http://localhost:8200}
      - DATA_DIR=/app/data
    volumes:
      - myrag-data:/app/data
    dns:
      - 8.8.8.8
      - 8.8.4.4
    restart: unless-stopped
    networks:
      default:
      owuicore:
        aliases:
          - myrag

volumes:
  myrag-data:

networks:
  owuicore:
    external: true
    name: ${OWUI_NETWORK:-owui-net}
