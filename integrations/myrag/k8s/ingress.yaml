apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: myrag
  namespace: myrag
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
spec:
  tls:
    - hosts:
        - myrag.mirai.gouv.fr
      secretName: myrag-tls
  rules:
    - host: myrag.mirai.gouv.fr
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: myrag
                port:
                  number: 8200
