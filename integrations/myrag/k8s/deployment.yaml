apiVersion: apps/v1
kind: Deployment
metadata:
  name: myrag
  namespace: myrag
  labels:
    app: myrag
spec:
  replicas: 1
  selector:
    matchLabels:
      app: myrag
  template:
    metadata:
      labels:
        app: myrag
    spec:
      containers:
        - name: myrag
          image: rg.fr-par.scw.cloud/funcscwnspricelessmontalcinhiacgnzi/myrag:latest
          ports:
            - containerPort: 8200
          env:
            - name: APP_TITLE
              value: "MyRAG (beta)"
            - name: OPENRAG_URL
              valueFrom:
                configMapKeyRef:
                  name: myrag-config
                  key: OPENRAG_URL
            - name: OPENRAG_ADMIN_TOKEN
              valueFrom:
                secretKeyRef:
                  name: myrag-secrets
                  key: OPENRAG_ADMIN_TOKEN
            - name: KEYCLOAK_URL
              valueFrom:
                configMapKeyRef:
                  name: myrag-config
                  key: KEYCLOAK_URL
            - name: KEYCLOAK_REALM
              valueFrom:
                configMapKeyRef:
                  name: myrag-config
                  key: KEYCLOAK_REALM
            - name: KEYCLOAK_CLIENT_ID
              value: "myrag-admin"
            - name: KEYCLOAK_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: myrag-secrets
                  key: KEYCLOAK_CLIENT_SECRET
            - name: LEGIFRANCE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: myrag-secrets
                  key: LEGIFRANCE_CLIENT_ID
                  optional: true
            - name: LEGIFRANCE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: myrag-secrets
                  key: LEGIFRANCE_CLIENT_SECRET
                  optional: true
            - name: MYRAG_PUBLIC_URL
              valueFrom:
                configMapKeyRef:
                  name: myrag-config
                  key: MYRAG_PUBLIC_URL
            - name: GRAPHRAG_VIEWER_URL
              valueFrom:
                configMapKeyRef:
                  name: myrag-config
                  key: GRAPHRAG_VIEWER_URL
                  optional: true
            - name: DATA_DIR
              value: "/app/data"
          volumeMounts:
            - name: data
              mountPath: /app/data
          livenessProbe:
            httpGet:
              path: /health
              port: 8200
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8200
            initialDelaySeconds: 3
            periodSeconds: 10
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "1Gi"
              cpu: "500m"
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: myrag-data
