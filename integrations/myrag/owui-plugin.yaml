# MyRAG (beta) — Open WebUI integration
# This file declares the tool and filter for the owuicore-main plugin system

tools:
  entries:
    - id: myrag
      name: "MyRAG (beta)"
      description: "Recherche RAG + graph de references dans les collections MyRAG. Cite les articles avec Livre/Titre/Chapitre."
      source_file: owui/tool_myrag.py
      service_name: myrag
      service_port: 8200
      methods:
        - search_collection
        - view_article
        - explore_graph
        - browse_collection

filters:
  entries:
    - id: myrag-collection-filter
      name: "MyRAG #Collection Filter"
      description: "Detecte #collection dans le prompt et injecte le contexte RAG"
      source_file: owui/pipe_myrag_filter.py

pipelines:
  files: []
  requirements: ""
